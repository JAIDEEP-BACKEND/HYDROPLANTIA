<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro Plantia Pro - 2-Zone Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.08); }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="text-slate-900">

    <div id="motion-alert-banner" class="hidden bg-red-600 text-white text-center py-3 font-bold sticky top-0 z-50 shadow-lg">
        SECURITY ALERT: MOTION DETECTED!
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-800">Hydro <span class="text-emerald-600">Plantia</span></h1>
                <p class="text-slate-500 font-medium">Dual-Zone Intelligence Hub</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sensor Data (Left) -->
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 border-l-4 border-red-500">
                        <h3 class="text-slate-500 text-xs font-black uppercase mb-1">Temperature (°C)</h3>
                        <div class="h-48"><canvas id="temperatureChart"></canvas></div>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-blue-500">
                        <h3 class="text-slate-500 text-xs font-black uppercase mb-1">Soil Moisture (%)</h3>
                        <div class="h-48"><canvas id="soilMoistureChart"></canvas></div>
                    </div>
                </div>

                <!-- Weather -->
                <div class="glass-card p-6">
                    <h2 class="text-lg font-bold text-slate-700 mb-4 uppercase">7-Day Forecast</h2>
                    <div id="weather-content" class="grid grid-cols-4 lg:grid-cols-7 gap-2"></div>
                </div>
            </div>

            <!-- Controls (Right) -->
            <div class="space-y-6">
                <!-- Security Status -->
                <div id="security-card" class="glass-card p-6 border-l-4 border-emerald-500">
                    <div class="flex items-center gap-3">
                        <div id="security-indicator" class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span id="security-text" class="font-bold text-emerald-600 uppercase tracking-widest text-sm">System Secure</span>
                    </div>
                </div>

                <!-- 2-Servo Control Panel -->
                <div class="glass-card p-6 border-b-4 border-emerald-500">
                    <h2 class="text-xl font-bold text-slate-700 mb-6 uppercase tracking-tight">Water Separator</h2>
                    
                    <div class="space-y-4">
                        <!-- Section 1 (D1) -->
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Section 1 (Pin D1)</span>
                            <div class="grid grid-cols-2 gap-2 mt-2">
                                <button onclick="sendServoCommand('open1')" class="btn-press py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-xs uppercase">Open</button>
                                <button onclick="sendServoCommand('close1')" class="btn-press py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl font-bold text-xs uppercase">Close</button>
                            </div>
                        </div>

                        <!-- Section 2 (D2) -->
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Section 2 (Pin D2)</span>
                            <div class="grid grid-cols-2 gap-2 mt-2">
                                <button onclick="sendServoCommand('open2')" class="btn-press py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-xs uppercase">Open</button>
                                <button onclick="sendServoCommand('close2')" class="btn-press py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl font-bold text-xs uppercase">Close</button>
                            </div>
                        </div>

                        <!-- Master Panel -->
                        <div class="bg-slate-900 p-5 rounded-2xl mt-6">
                            <div class="grid grid-cols-1 gap-3">
                                <button onclick="sendServoCommand('openall')" class="btn-press w-full bg-emerald-500 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest">Deploy All Zones</button>
                                <button onclick="sendServoCommand('closeall')" class="btn-press w-full bg-slate-700 text-slate-300 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Secure All Zones</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIdmbpwWmE26iH8l7T5Au2ziUKlKDgJ5U",
            authDomain: "arduhub.firebaseapp.com",
            databaseURL: "https://arduhub-default-rtdb.firebaseio.com",
            projectId: "arduhub",
            storageBucket: "arduhub.appspot.com",
            messagingSenderId: "229042276706",
            appId: "1:229042276706:web:b67270ae3c58bea248843b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Security Listener
        database.ref('esp32/motion_active').on('value', snap => {
            const isMotion = snap.val();
            const banner = document.getElementById('motion-alert-banner');
            const indicator = document.getElementById('security-indicator');
            const text = document.getElementById('security-text');
            
            if (isMotion) {
                banner.classList.remove('hidden');
                indicator.className = "w-3 h-3 rounded-full bg-red-500 animate-ping";
                text.innerText = "Motion Detected!";
                text.className = "font-bold text-red-600 uppercase tracking-widest text-sm";
            } else {
                banner.classList.add('hidden');
                indicator.className = "w-3 h-3 rounded-full bg-emerald-500 animate-pulse";
                text.innerText = "System Secure";
                text.className = "font-bold text-emerald-600 uppercase tracking-widest text-sm";
            }
        });

        // Charts initialization
        function createChart(ctx, label, color, bgColor) {
            return new Chart(ctx, {
                type: 'line',
                data: { 
                    datasets: [{ 
                        label: label,
                        data: [], 
                        borderColor: color, 
                        backgroundColor: bgColor,
                        borderWidth: 3, 
                        fill: true, 
                        tension: 0.4, 
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        x: { 
                            type: 'time',
                            time: {
                                unit: 'second',
                                displayFormats: { second: 'HH:mm:ss' }
                            },
                            grid: { display: false }, 
                            ticks: { color: '#94a3b8', font: { weight: '600', size: 10 } }
                        }, 
                        y: { 
                            grid: { color: '#f1f5f9' }, 
                            ticks: { color: '#94a3b8', font: { weight: '600', size: 10 } } 
                        } 
                    }, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });
        }

        const tempChart = createChart(document.getElementById('temperatureChart').getContext('2d'), 'Temp', '#f43f5e', 'rgba(244, 63, 94, 0.1)');
        const moistureChart = createChart(document.getElementById('soilMoistureChart').getContext('2d'), 'Moisture', '#3b82f6', 'rgba(59, 130, 246, 0.1)');

        // Data Throttling State
        let currentTemp = null;
        let currentMoisture = null;

        function updateChart(chart, val) {
            const chartData = chart.data.datasets[0].data;
            chartData.push({ x: new Date(), y: val });
            if (chartData.length > 25) chartData.shift();
            chart.update('none');
        }

        // Firebase Listeners (Update current state only)
        database.ref('esp32/temperature').on('value', s => currentTemp = s.val());
        database.ref('esp32/soil_moisture').on('value', s => currentMoisture = s.val());

        // 5-Second Interval for Graph Generation
        setInterval(() => {
            if (currentTemp !== null) updateChart(tempChart, currentTemp);
            if (currentMoisture !== null) updateChart(moistureChart, currentMoisture);
        }, 5000);

        function sendServoCommand(cmd) {
            database.ref('esp8266/command').set(cmd);
        }

        async function getWeatherData() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=30.70&longitude=76.71&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
                const data = await res.json();
                const container = document.getElementById('weather-content');
                data.daily.time.forEach((t, i) => {
                    const day = new Date(t).toLocaleDateString('en-US', { weekday: 'short' });
                    container.innerHTML += `<div class="bg-white p-2 rounded-xl text-center border border-slate-100 shadow-sm"><p class="text-[8px] font-black text-slate-400 uppercase">${day}</p><p class="text-lg my-1">${data.daily.weathercode[i] < 4 ? '☀️' : '🌧️'}</p><p class="text-[10px] font-bold">${Math.round(data.daily.temperature_2m_max[i])}°</p></div>`;
                });
            } catch (e) { console.error(e); }
        }
        getWeatherData();
    </script>
</body>
</html>
